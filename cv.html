<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Curriculum Vitae — Miraj Samarakkody</title>
    <link rel="stylesheet" href="styles.css"/>
    <style>
        .cv-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .cv-frame {
            width: 100%;
            height: 85vh;
            border: 1px solid var(--color-accent);
            border-radius: 6px;
        }
    </style>
</head>

<!-- Placeholder for the header -->
<header id="header-placeholder"></header>

<body>
<main>
    <div class="content">
        <div class="cv-toolbar">
            <h1>Curriculum Vitae</h1>
            <a href="https://raw.githubusercontent.com/mirajcs/CV/main/CV.pdf" target="_blank" class="button">Open / Download PDF</a>
        </div>

        <!-- Inline PDF view sourced from the mirajcs/CV GitHub repo.
             raw.githubusercontent.com serves the PDF as application/octet-stream,
             so it is wrapped in Google's PDF viewer to render inline. -->
        <iframe class="cv-frame"
                src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/mirajcs/CV/main/CV.pdf&embedded=true"
                title="Curriculum Vitae of Miraj Samarakkody">
            Your browser does not support inline PDFs.
            <a href="https://raw.githubusercontent.com/mirajcs/CV/main/CV.pdf" target="_blank">Click here to view the CV.</a>
        </iframe>
    </div>
</main>

<footer id="footer-placeholder"></footer>
<script src="script.js"></script>
</body>
</html>
